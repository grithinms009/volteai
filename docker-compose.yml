version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: anigravity_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: anigravity
      POSTGRES_USER: anigravity
      POSTGRES_PASSWORD: Anigravity@2025
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anigravity"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: anigravity_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: anigravity_backend
    restart: unless-stopped
    command: node src/server.js
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./reports:/app/reports
    env_file: .env
    environment:
      DATABASE_URL: postgresql://anigravity:Anigravity@2025@postgres:5432/anigravity
      REDIS_URL: redis://redis:6379
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    build: .
    container_name: anigravity_worker
    restart: unless-stopped
    command: node src/workers/analysisWorker.js
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./reports:/app/reports
    env_file: .env
    environment:
      DATABASE_URL: postgresql://anigravity:Anigravity@2025@postgres:5432/anigravity
      REDIS_URL: redis://redis:6379
      OLLAMA_BASE_URL: http://host.docker.internal:11434

volumes:
  postgres_data:
  redis_data:
